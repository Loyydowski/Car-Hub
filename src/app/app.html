  <a href="#">Strona Główna</a>
  <a href="#">Polecane</a>
  <a href="#">Kontakt</a>
</nav>
<div class="car-app">
  <header class="app-header">
    <p class="app-eyebrow">Galeria</p>
    <h1 class="app-title">Premium Cars<br></h1>
  </header>
  <div class="filter-bar">
    <span class="filter-label">Filtruj markę</span>
    <div class="brand-switch brand-bmw form-check form-switch">
      <input class="form-check-input" type="checkbox" [(ngModel)]="czySzukaBMW" id="ctrId">
      <label class="form-check-label" for="ctrId">BMW</label>
    </div>
    <div class="brand-switch brand-audi form-check form-switch">
      <input class="form-check-input" type="checkbox" [(ngModel)]="czySzukaAudi" id="ctrId2">
      <label class="form-check-label" for="ctrId2">AUDI</label>
    </div>
    <div class="brand-switch brand-mercedes form-check form-switch">
      <input class="form-check-input" type="checkbox" [(ngModel)]="czySzukaMercedes" id="ctrId3">
      <label class="form-check-label" for="ctrId3">Mercedes</label>
    </div>
  </div>
  <div class="row g-4">
    <div class="col-sm-6 col-md-4" *ngFor="let obrazki of filter">
      <div class="car-card">
        <div class="car-img-wrap">
          <img [src]="'assets/' + obrazki.ImgPath" [alt]="obrazki.brand" class="car-img">
        </div>
        <div class="car-footer">
          <button class="like-btn" (click)="obrazki.likes = obrazki.likes + 1">
            <i class="bi bi-heart-fill" aria-hidden="true"></i>
            Polub
          </button>
          <p>{{obrazki.model}}</p>
          <span class="like-count">
            <i class="bi bi-hand-thumbs-up" aria-hidden="true"></i>
            {{ obrazki.likes }}
          </span>
        </div>
      </div>
    </div>
  </div>
  <p class="no-results" *ngIf="filter.length === 0">
    <i class="bi bi-search" aria-hidden="true"></i>
    Brak wyników dla wybranych marek.
  </p>
</div>
